name: Main-Branch Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build and Test
  # ─────────────────────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: '20'
      run_tests: true

  # ─────────────────────────────────────────────
  # Job 2: Generate Short SHA
  # ─────────────────────────────────────────────
  generate-sha:
    name: Generate Short SHA
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Create short commit SHA
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Job 3: Docker Build & Push (SHA tag)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [build-test, generate-sha]
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: github-actions-capstone
      tag: sha-${{ needs.generate-sha.outputs.short_sha }}
      docker_username: ${{ vars.DOCKER_USERNAME }}
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4: Trivy Security Scan
  # Must pass before deploy is allowed to run
  # ─────────────────────────────────────────────
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [docker-build, generate-sha]

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/github-actions-capstone:sha-${{ needs.generate-sha.outputs.short_sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  # ─────────────────────────────────────────────
  # Job 5: Deploy to Production
  # Only runs after trivy-scan passes (security gate enforced)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [trivy-scan, docker-build]
    environment: production

    steps:
      - name: Deploy image
        run: |
          echo "Deploying image: ${{ needs.docker-build.outputs.image_url }} to production"
