name: Scheduled Health-Check

on:
  schedule:
    # Runs at minute 0, every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to test (default: latest)'
        required: false
        default: 'latest'

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ vars.DOCKER_USERNAME }}/github-actions-capstone
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
      PORT: 8080
      CONTAINER_NAME: healthcheck_temp

    steps:
      - name: Pull Docker Image
        run: |
          echo "Pulling image: $IMAGE_NAME:$IMAGE_TAG"
          docker pull "$IMAGE_NAME:$IMAGE_TAG"

      - name: Run Container (detached)
        run: |
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 8080:8080 \
            "$IMAGE_NAME:$IMAGE_TAG"

      - name: Wait for Container to Start
        run: sleep 5

      - name: Curl Health Endpoint
        id: curl-check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$PORT/")
          echo "HTTP status: $HTTP_STATUS"
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT

      - name: Print Health Check Result
        run: |
          if [ "${{ steps.curl-check.outputs.http_status }}" -eq 200 ]; then
            echo "✅ Health check PASSED — HTTP ${{ steps.curl-check.outputs.http_status }}"
          else
            echo "❌ Health check FAILED — HTTP ${{ steps.curl-check.outputs.http_status }}"
            exit 1
          fi

      - name: Stop and Remove Container
        if: always()
        run: |
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          echo "Container cleaned up."

      - name: Write Step Summary
        if: always()
        run: |
          if [ "${{ steps.curl-check.outputs.http_status }}" -eq 200 ]; then
            STATUS="✅ PASSED"
          else
            STATUS="❌ FAILED"
          fi
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: $IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **HTTP Status**: ${{ steps.curl-check.outputs.http_status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
